<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" fill="none"
  stroke="#2b2622" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
  role="img" aria-label="Roman arcade">
  <defs>
    <!-- One arch opening, base at y=0, rising 110 (springline -60, radius 50). -->
    <path id="ath-arch" d="M25 0 L25 -60 A50 50 0 0 1 125 -60 L125 0" />
  </defs>

  <!-- Ground -->
  <line x1="2" y1="506" x2="1198" y2="506" />

  <!-- Tier 1 (lower arcade) -->
  <g>
    <use href="#ath-arch" x="0" y="500" />
    <use href="#ath-arch" x="150" y="500" />
    <use href="#ath-arch" x="300" y="500" />
    <use href="#ath-arch" x="450" y="500" />
    <use href="#ath-arch" x="600" y="500" />
    <use href="#ath-arch" x="750" y="500" />
    <use href="#ath-arch" x="900" y="500" />
    <use href="#ath-arch" x="1050" y="500" />
  </g>
  <line x1="2" y1="500" x2="1198" y2="500" />
  <line x1="2" y1="344" x2="1198" y2="344" />

  <!-- Tier 2 (middle arcade) -->
  <g>
    <use href="#ath-arch" x="0" y="340" />
    <use href="#ath-arch" x="150" y="340" />
    <use href="#ath-arch" x="300" y="340" />
    <use href="#ath-arch" x="450" y="340" />
    <use href="#ath-arch" x="600" y="340" />
    <use href="#ath-arch" x="750" y="340" />
    <use href="#ath-arch" x="900" y="340" />
    <use href="#ath-arch" x="1050" y="340" />
  </g>
  <line x1="2" y1="200" x2="1198" y2="200" />

  <!-- Tier 3 (upper arcade) -->
  <g>
    <use href="#ath-arch" x="0" y="200" />
    <use href="#ath-arch" x="150" y="200" />
    <use href="#ath-arch" x="300" y="200" />
    <use href="#ath-arch" x="450" y="200" />
    <use href="#ath-arch" x="600" y="200" />
    <use href="#ath-arch" x="750" y="200" />
    <use href="#ath-arch" x="900" y="200" />
    <use href="#ath-arch" x="1050" y="200" />
  </g>
  <line x1="2" y1="150" x2="1198" y2="150" />

  <!-- Attic tier (the Colosseum's top band of small square windows) -->
  <g>
    <rect x="60" y="96" width="30" height="40" rx="3" />
    <rect x="210" y="96" width="30" height="40" rx="3" />
    <rect x="360" y="96" width="30" height="40" rx="3" />
    <rect x="510" y="96" width="30" height="40" rx="3" />
    <rect x="660" y="96" width="30" height="40" rx="3" />
    <rect x="810" y="96" width="30" height="40" rx="3" />
    <rect x="960" y="96" width="30" height="40" rx="3" />
    <rect x="1110" y="96" width="30" height="40" rx="3" />
  </g>
  <line x1="2" y1="80" x2="1198" y2="80" />

  <!-- Outer wall edges -->
  <line x1="4" y1="80" x2="4" y2="506" />
  <line x1="1196" y1="80" x2="1196" y2="506" />
</svg>
