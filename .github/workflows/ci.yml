name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ayanakoji/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "ayanakoji/backend/uv.lock"

      - name: Sync dependencies (Python 3.12)
        run: uv sync --python 3.12 --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Test (pytest, coverage >= 80%)
        run: uv run pytest

      - name: Verify Work IQ data source matches the synthesizer (deterministic)
        run: |
          uv run python scripts/generate_work_iq.py
          git diff --exit-code app/data/work_iq.json

  frontend:
    name: Frontend (eslint · tsc · vitest · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ayanakoji/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ayanakoji/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Type check (tsc)
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test:run

      - name: Build (next)
        run: pnpm build

  e2e:
    name: E2E (Playwright, FE<->BE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "ayanakoji/backend/uv.lock"

      - name: Sync backend (for uvicorn)
        run: uv sync --python 3.12 --frozen
        working-directory: ayanakoji/backend

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ayanakoji/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ayanakoji/frontend

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
        working-directory: ayanakoji/frontend

      - name: Run E2E (Playwright boots both servers)
        run: pnpm e2e
        working-directory: ayanakoji/frontend

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ayanakoji/frontend/playwright-report/
          retention-days: 7

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        run: gitleaks dir . --redact --verbose
